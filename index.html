<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon-Armor</title>
    <style>
        :root {
            --bg-color: #0d0d12; --accent-color: #00ffcc; --danger-color: #ff0055;
            --gold-color: #ffd700; --text-color: #ffffff; --ui-bg: rgba(13, 13, 18, 0.95);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; justify-content: center; align-items: center; user-select: none;
            touch-action: none;
        }
        #appWrapper { display: flex; gap: 20px; width: 100%; height: 100%; justify-content: center; align-items: center; }
        #gameContainer { position: relative; width: 1024px; height: 768px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #leaderboardPanel { width: 250px; height: 768px; background: #111; border: 2px solid var(--accent-color); padding: 20px; box-sizing: border-box; overflow-y: auto; border-radius: 8px; }
        #leaderboardPanel h2 { color: var(--accent-color); text-align: center; font-size: 1.2em; margin-top: 0; }
        .lb-entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.9em; }

        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .screen { background: var(--ui-bg); padding: 30px; border: 2px solid var(--accent-color); border-radius: 8px; text-align: center; pointer-events: auto; box-shadow: 0 0 15px var(--accent-color); display: none; max-width: 800px; max-height: 90%; overflow-y: auto; }
        .screen.active { display: block; }
        h1 { margin-top: 0; color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }
        
        input { padding: 10px; font-size: 1.2em; font-family: inherit; background: #000; border: 1px solid var(--accent-color); color: #fff; width: 80%; margin-bottom: 15px; text-align: center; }
        button { background: var(--accent-color); color: #000; border: none; padding: 12px 24px; font-size: 1em; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; font-family: inherit; margin: 5px; }
        button:hover { background: #fff; }

        /* Controles Móviles */
        .mobile-ctrl { position: absolute; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; pointer-events: auto; border: 2px solid var(--accent-color); }
        #moveJoy { left: 40px; }
        #shootJoy { right: 40px; }
        .joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: var(--accent-color); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.6; }
        #btnPauseMobile { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(0,0,0,0.5); border: 2px solid var(--accent-color); color: white; border-radius: 50%; display: none; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; font-weight: bold; }

        @media (max-width: 1024px) {
            #leaderboardPanel { display: none; }
            #gameContainer { width: 100vw; height: 100vh; }
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .weapon-card { border: 1px solid #555; padding: 10px; background: #111; }
        .weapon-card.selected { border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
        .mutations-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .mutation-card { border: 1px solid var(--accent-color); padding: 15px; cursor: pointer; }
    </style>
</head>
<body>
<div id="appWrapper">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1024" height="768"></canvas>
        
        <div id="moveJoy" class="mobile-ctrl"><div class="joy-stick"></div></div>
        <div id="shootJoy" class="mobile-ctrl"><div class="joy-stick"></div></div>
        <div id="btnPauseMobile">II</div>

        <div id="uiLayer">
            <div id="loginScreen" class="screen active">
                <h1>NEON-ARMOR</h1><p>Identificación de Usuario</p>
                <input type="text" id="usernameInput" placeholder="Usuario" maxlength="12"><br>
                <input type="password" id="passwordInput" placeholder="Contraseña"><br>
                <button id="btnLogin">Acceder</button>
            </div>

            <div id="menuScreen" class="screen">
                <h1>NEON-ARMOR</h1>
                <div id="uiUserStats" style="margin-bottom:15px; font-size: 0.9em; color: var(--accent-color);"></div>
                <div class="menu-grid">
                    <button id="btnStory">HISTORIA</button>
                    <button id="btnSurvival" style="background:var(--danger-color); color:#fff">SUPERVIVENCIA</button>
                    <button id="btnStore">ARMERÍA</button>
                    <button id="btnSound">SONIDO</button>
                </div>
                <button id="btnLogout" style="margin-top:10px; background:#444; color:#fff">Salir</button>
            </div>

            <div id="storeScreen" class="screen">
                <h2>ARMERÍA</h2><p>Créditos: <span id="storeCoins"></span></p>
                <div class="store-grid" id="storeContainer"></div>
                <button id="btnBackToMenu">Volver</button>
            </div>

            <div id="mutationScreen" class="screen">
                <h2>MEJORA DISPONIBLE</h2>
                <div class="mutations-grid" id="mutationsContainer"></div>
            </div>

            <div id="pauseScreen" class="screen">
                <h2>PAUSA</h2>
                <button id="btnResume">Continuar</button>
                <button id="btnQuit" style="background:var(--danger-color); color:#fff">Abandonar</button>
            </div>

            <div id="gameOverScreen" class="screen">
                <h2>CONEXIÓN PERDIDA</h2>
                <p id="goContext"></p>
                <p>Puntos: <span id="goScore"></span></p>
                <button id="btnReturnDead">Menú Principal</button>
            </div>

            <div id="victoryScreen" class="screen">
                <h2 style="color:var(--gold-color)">MISIÓN CUMPLIDA</h2>
                <p>Puntos: <span id="vicScore"></span></p>
                <button id="btnReturnWin">Menú Principal</button>
            </div>
        </div>
    </div>
    <div id="leaderboardPanel"><h2>TOP PILOTOS</h2><div id="lbContainer"></div></div>
</div>

<script>
const CANVAS_WIDTH = 1024, CANVAS_HEIGHT = 768, TILE_SIZE = 64;

const WEAPONS = {
    p1: { id: 'p1', name: 'Pistola', type: 'pistol', cost: 0, damage: 10, fireRate: 300, speed: 600, spread: 0.04, auto: false, color: '#aaa', magSize: 12, reloadTime: 1.2 },
    s1: { id: 's1', name: 'Escopeta', type: 'shotgun', cost: 0, damage: 8, fireRate: 900, speed: 500, spread: 0.35, auto: false, bullets: 5, color: '#aaa', magSize: 4, reloadTime: 2.0 },
    r1: { id: 'r1', name: 'Rifle', type: 'rifle', cost: 0, damage: 5, fireRate: 150, speed: 750, spread: 0.1, auto: true, color: '#aaa', magSize: 30, reloadTime: 1.8 },
    sn1: { id: 'sn1', name: 'Francotirador', type: 'sniper', cost: 500, damage: 80, fireRate: 1500, speed: 1800, spread: 0, auto: false, color: '#f00', magSize: 5, reloadTime: 3.0 },
    l1: { id: 'l1', name: 'Láser', type: 'laser', cost: 800, damage: 4, fireRate: 50, speed: 1200, spread: 0.01, auto: true, color: '#00ffcc', magSize: 100, reloadTime: 2.5 }
};

const ENEMY_CONFIGS = {
    basic: { color: '#ff4444', hp: 20, speed: 80, damage: 10, radius: 15, type: 'melee' },
    fast:  { color: '#ffaa00', hp: 12, speed: 160, damage: 6, radius: 12, type: 'melee' },
    tank:  { color: '#aa0000', hp: 60, speed: 45, damage: 15, radius: 20, type: 'melee' },
    summoner: { color: '#8800ff', hp: 40, speed: 50, damage: 5, radius: 16, type: 'summoner' },
    boss:  { color: '#ff00ff', hp: 1000, speed: 90, damage: 30, radius: 30, type: 'boss' }
};

const MUTATIONS = [
    { id: 'hp', name: '+50% Salud', apply: p => { p.maxHp *= 1.5; p.hp = p.maxHp; } },
    { id: 'dmg', name: '+20% Ataque', apply: p => p.dmgMult += 0.2 },
    { id: 'speed', name: '+15% Vel.', apply: p => p.baseSpeed *= 1.15 }
];

let db = { users: {} }, currentUser = null, soundEnabled = true;

function saveDB() { localStorage.setItem('neonArmorDB', JSON.stringify(db)); }
function loadDB() {
    const data = localStorage.getItem('neonArmorDB');
    if (data) db = JSON.parse(data);
    updateLeaderboard();
}

function updateLeaderboard() {
    const cont = document.getElementById('lbContainer');
    if(!cont) return;
    cont.innerHTML = '';
    let arr = Object.keys(db.users).map(k => ({ u: k, s: db.users[k].highScore || 0 })).filter(x => x.s > 0);
    arr.sort((a, b) => b.s - a.s).slice(0, 10).forEach((e, i) => {
        cont.innerHTML += `<div class="lb-entry"><span>${i+1}. ${e.u}</span><span>${e.s}</span></div>`;
    });
}

class AudioSystem {
    constructor() { this.ctx = null; }
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    play(freq, type, dur, vol=0.1) {
        if (!soundEnabled || !this.ctx) return;
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + dur);
    }
}
const audio = new AudioSystem();

class Joystick {
    constructor(elId) {
        this.el = document.getElementById(elId);
        this.stick = this.el.querySelector('.joy-stick');
        this.active = false;
        this.dir = { x: 0, y: 0 };
        this.origin = { x: 0, y: 0 };

        const handleStart = (e) => {
            this.active = true;
            const t = e.touches ? e.touches[0] : e;
            const r = this.el.getBoundingClientRect();
            this.origin = { x: r.left + r.width/2, y: r.top + r.height/2 };
            handleMove(e);
        };
        const handleMove = (e) => {
            if(!this.active) return;
            const t = e.touches ? e.touches[0] : e;
            let dx = t.clientX - this.origin.x, dy = t.clientY - this.origin.y;
            const dist = Math.hypot(dx, dy);
            const max = 50;
            if(dist > max) { dx *= max/dist; dy *= max/dist; }
            this.stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            this.dir = { x: dx/max, y: dy/max };
        };
        const handleEnd = () => {
            this.active = false;
            this.dir = { x: 0, y: 0 };
            this.stick.style.transform = `translate(-50%, -50%)`;
        };
        this.el.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.state = 'LOGIN';
        this.input = { keys: {}, mouse: { x:0, y:0, down:false } };
        this.joystickMove = null;
        this.joystickShoot = null;
        this.isTouch = false;

        window.addEventListener('keydown', e => this.input.keys[e.code] = true);
        window.addEventListener('keyup', e => this.input.keys[e.code] = false);
        this.canvas.addEventListener('mousedown', () => this.input.mouse.down = true);
        this.canvas.addEventListener('mouseup', () => this.input.mouse.down = false);
        this.canvas.addEventListener('mousemove', e => {
            const r = this.canvas.getBoundingClientRect();
            this.input.mouse.x = e.clientX - r.left;
            this.input.mouse.y = e.clientY - r.top;
        });

        // Detectar Touch
        window.addEventListener('touchstart', () => {
            if(!this.isTouch) {
                this.isTouch = true;
                document.querySelectorAll('.mobile-ctrl').forEach(el => el.style.display = 'block');
                document.getElementById('btnPauseMobile').style.display = 'flex';
                this.joystickMove = new Joystick('moveJoy');
                this.joystickShoot = new Joystick('shootJoy');
            }
        }, {once: true});

        document.getElementById('btnPauseMobile').onclick = () => this.togglePause();

        this.setupUI();
        loadDB();
        this.loop();
    }

    setupUI() {
        document.getElementById('btnLogin').onclick = () => {
            const u = document.getElementById('usernameInput').value.trim();
            if(u) {
                if(!db.users[u]) db.users[u] = { coins:0, highScore:0, unlocks:['p1','s1','r1'], selectedWeapon:'p1' };
                currentUser = u;
                this.state = 'MENU';
                this.updateUI();
                audio.init();
            }
        };
        document.getElementById('btnStory').onclick = () => this.startRun('STORY');
        document.getElementById('btnSurvival').onclick = () => this.startRun('SURVIVAL');
        document.getElementById('btnResume').onclick = () => this.togglePause();
        document.getElementById('btnQuit').onclick = () => this.state = 'MENU';
        document.querySelectorAll('[id^=btnReturn]').forEach(b => b.onclick = () => this.state = 'MENU');
    }

    updateUI() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(this.state === 'MENU') {
            document.getElementById('menuScreen').classList.add('active');
            document.getElementById('uiUserStats').innerText = `Piloto: ${currentUser} | Créditos: ${db.users[currentUser].coins}`;
        } else if(this.state === 'PAUSED') document.getElementById('pauseScreen').classList.add('active');
        else if(this.state === 'GAMEOVER') document.getElementById('gameOverScreen').classList.add('active');
        else if(this.state === 'VICTORY') document.getElementById('victoryScreen').classList.add('active');
    }

    togglePause() {
        if(this.state === 'PLAYING') this.state = 'PAUSED';
        else if(this.state === 'PAUSED') this.state = 'PLAYING';
        this.updateUI();
    }

    startRun(mode) {
        this.mode = mode;
        this.levelIndex = 0;
        this.score = 0;
        this.coins = 0;
        this.player = {
            x: 512, y: 384, hp: 100, maxHp: 100, radius: 12, 
            baseSpeed: 200, dmgMult: 1.0, 
            weapon: JSON.parse(JSON.stringify(WEAPONS[db.users[currentUser].selectedWeapon])),
            lastFire: 0
        };
        this.enemies = [];
        this.bullets = [];
        this.state = 'PLAYING';
        this.updateUI();
        this.spawnWave();
    }

    spawnWave() {
        for(let i=0; i < 5 + this.levelIndex; i++) {
            const ang = Math.random() * Math.PI * 2;
            this.enemies.push(new Enemy(
                'basic', 
                this.player.x + Math.cos(ang) * 400, 
                this.player.y + Math.sin(ang) * 400, 
                false
            ));
        }
    }

    loop() {
        const now = performance.now();
        const dt = (now - (this.lastTime || now)) / 1000;
        this.lastTime = now;

        if(this.state === 'PLAYING') {
            this.update(dt);
        }
        this.draw();
        requestAnimationFrame(() => this.loop());
    }

    update(dt) {
        // Movimiento
        let mx = 0, my = 0;
        if(this.isTouch && this.joystickMove) {
            mx = this.joystickMove.dir.x;
            my = this.joystickMove.dir.y;
        } else {
            if(this.input.keys['KeyW']) my -= 1;
            if(this.input.keys['KeyS']) my += 1;
            if(this.input.keys['KeyA']) mx -= 1;
            if(this.input.keys['KeyD']) mx += 1;
        }
        const speed = this.player.baseSpeed * dt;
        this.player.x += mx * speed;
        this.player.y += my * speed;

        // Disparo
        let shoot = false, sx = 0, sy = 0;
        if(this.isTouch && this.joystickShoot && (Math.abs(this.joystickShoot.dir.x) > 0.1 || Math.abs(this.joystickShoot.dir.y) > 0.1)) {
            shoot = true;
            sx = this.player.x + this.joystickShoot.dir.x * 100;
            sy = this.player.y + this.joystickShoot.dir.y * 100;
        } else if(this.input.mouse.down) {
            shoot = true;
            sx = this.input.mouse.x; // Nota: En un juego real con cámara, sumarías el offset
            sy = this.input.mouse.y;
        }

        if(shoot && now() - this.player.lastFire > this.player.weapon.fireRate) {
            this.player.lastFire = now();
            const ang = Math.atan2(sy - this.player.y, sx - this.player.x);
            this.bullets.push({
                x: this.player.x, y: this.player.y, 
                vx: Math.cos(ang) * this.player.weapon.speed, 
                vy: Math.sin(ang) * this.player.weapon.speed,
                dmg: this.player.weapon.damage * this.player.dmgMult,
                color: this.player.weapon.color, radius: 4
            });
            audio.play(400, 'square', 0.1);
        }

        // Balas
        this.bullets.forEach((b, i) => {
            b.x += b.vx * dt; b.y += b.vy * dt;
            if(b.x < 0 || b.x > 1024 || b.y < 0 || b.y > 768) this.bullets.splice(i, 1);
        });

        // Enemigos
        this.enemies.forEach((e, i) => {
            const dist = Math.hypot(this.player.x - e.x, this.player.y - e.y);
            e.x += ((this.player.x - e.x) / dist) * e.speed * dt;
            e.y += ((this.player.y - e.y) / dist) * e.speed * dt;

            // Colisión con balas
            this.bullets.forEach((b, bi) => {
                if(Math.hypot(e.x - b.x, e.y - b.y) < e.radius + b.radius) {
                    e.hp -= b.dmg;
                    this.bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        if(!e.isSummoned) {
                            // Puntos variables 1-5
                            this.score += Math.floor(Math.random() * 5) + 1;
                        }
                        this.enemies.splice(i, 1);
                        audio.play(100, 'sawtooth', 0.2);
                    }
                }
            });

            if(dist < e.radius + this.player.radius) {
                this.player.hp -= e.damage * dt;
                if(this.player.hp <= 0) {
                    this.state = 'GAMEOVER';
                    document.getElementById('goScore').innerText = this.score;
                    this.updateUI();
                }
            }
        });

        if(this.enemies.length === 0) {
            this.levelIndex++;
            this.spawnWave();
        }
    }

    draw() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0,0,1024,768);

        if(this.state === 'PLAYING' || this.state === 'PAUSED') {
            // Jugador
            this.ctx.fillStyle = '#00ffcc';
            this.ctx.beginPath();
            this.ctx.arc(this.player.x, this.player.y, this.player.radius, 0, Math.PI*2);
            this.ctx.fill();

            // Enemigos
            this.enemies.forEach(e => {
                this.ctx.fillStyle = e.color;
                this.ctx.beginPath();
                this.ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                this.ctx.fill();
            });

            // Balas
            this.bullets.forEach(b => {
                this.ctx.fillStyle = b.color;
                this.ctx.beginPath();
                this.ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                this.ctx.fill();
            });

            // HUD
            this.ctx.fillStyle = '#fff';
            this.ctx.font = '20px Courier New';
            this.ctx.fillText(`PUNTOS: ${this.score}`, 20, 30);
            this.ctx.fillStyle = '#ff0055';
            this.ctx.fillRect(20, 45, 200 * (this.player.hp/this.player.maxHp), 10);
        }
    }
}

class Enemy {
    constructor(type, x, y, isSummoned) {
        const c = ENEMY_CONFIGS[type];
        this.x = x; this.y = y;
        this.hp = c.hp; this.speed = c.speed;
        this.damage = c.damage; this.radius = c.radius;
        this.color = c.color;
        this.isSummoned = isSummoned; // Propiedad para evitar farm
    }
}

function now() { return performance.now(); }

window.onload = () => new Game();
</script>
</body>
</html>
